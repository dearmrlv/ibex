target_id: ibex_hazard_stall
design: ibex
description: >
  Seed spec for generating a raw RTL cone target for Ibex ID-stage hazard/stall signals.

rtl:
  top_module: ibex_id_stage

  filelists:
    - ${BSD_COV_ROOT}/designs/ibex/dv/uvm/core_ibex/ibex_dv.f

  include_dirs: []
  defines: []
  parameters:
    RV32E: 0
    RV32M: RV32MFast
    RV32B: RV32BNone
    DataIndTiming: 0
    BranchTargetALU: 0
    WritebackStage: 1
    BranchPredictor: 0
    MemECC: 0

endpoints:
  - name: stall_mem
    hier: stall_mem
    width: 1

  - name: stall_ld_hz
    hier: stall_ld_hz
    width: 1

  - name: stall_multdiv
    hier: stall_multdiv
    width: 1

  - name: stall_branch
    hier: stall_branch
    width: 1

  - name: stall_jump
    hier: stall_jump
    width: 1

  - name: rf_rd_wb_hz
    hier: fcov_rf_rd_wb_hz
    width: 1

policies:
  flatten_instances: true
  stop_at_module_inputs: true
  stop_at_sequential_state: true
  auto_promote_inputs: false
  deterministic_order: hierarchical_path

  unresolved_policy: error
  blackbox_policy: error
  memory_boundary_policy: error
  latch_boundary_policy: error
  multi_driver_policy: error
  unsupported_procedural_policy: error

trace:
  filename_suffix: bsd_cov_hazard_stall.csv
  enable_plusarg: bsd_cov_hazard_stall_trace
  sample_on: posedge
  sample_condition: instr_valid_i
  invalid_policy: drop
  x_policy: drop

design: ibex
method: riscvdv
experiment: ibex_prefix_2000_trace_seed888

ibex_dv_root: ${BSD_COV_ROOT}/designs/ibex/dv/uvm/core_ibex
setup_env: ${BSD_COV_ROOT}/designs/ibex/dv/uvm/core_ibex/setup_env.sh

make:
  ibex_config: opentitan
  simulator: xlm
  iss: spike
  waves: 0
  cov: 1
  verbose: 0

run:
  start_seed: 888
  num_seeds: 1

budget:
  primary_axis: generated_instr_count
  generated_instr_budget: 2000
  per_seed_generated_instr: 2000

sampling:
  mode: dense
  trigger_type: generated
  step: 2000
  limit: 2000

methods:
  - id: prefix_2000_trace_seed888
    name: prefix_2000_trace_seed888
    type: baseline
    test: bsd_cov_prefix_2000_trace_seed888
    description: riscv-dv baseline prefix trace, 2000 generated instructions.
    gen_test: riscv_instr_base_test
    rtl_test: core_ibex_base_test
    requested_instr_cnt: 2000
    gen_opts:
      - +instr_cnt=2000
      - +num_of_sub_program=5
      - +gen_all_csrs_by_default=1
      - +add_csr_write=MSTATUS,MEPC,MCAUSE,MTVAL,0x7c0,0x7c1
      - +no_csr_instr=0
    sim_opts: >
      +bsd_cov_hazard_stall_trace

design: ibex
method: riscvdv
experiment: ibex_200k_riscvdv_baseline
ibex_dv_root: /home/lvzhengyang/workspace/BSD-Cov/designs/ibex/dv/uvm/core_ibex
setup_env: /home/lvzhengyang/workspace/BSD-Cov/designs/ibex/dv/uvm/core_ibex/setup_env.sh
make:
  ibex_config: opentitan
  simulator: xlm
  iss: spike
  waves: 0
  cov: 1
  verbose: 0
run:
  start_seed: 888
  num_seeds: 1
budget:
  primary_axis: generated_instr_count
  generated_instr_budget: 200000
  per_seed_generated_instr: 200000
sampling:
  mode: dense
  trigger_type: generated
  step: 1000
  limit: 200000
methods:
- id: baseline_riscvdv_200k_dense_seed888
  name: baseline_riscvdv_200k_dense_seed888
  type: baseline
  test: bsd_cov_riscv_rand_instr_200k_dense
  description: riscv-dv random baseline with one seed, 200k generated instructions,
    sampled every 1k instructions.
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test
  requested_instr_cnt: 200000
  gen_opts:
  - +instr_cnt=200000
  - +num_of_sub_program=5
  - +gen_all_csrs_by_default=1
  - +add_csr_write=MSTATUS,MEPC,MCAUSE,MTVAL,0x7c0,0x7c1
  - +no_csr_instr=0

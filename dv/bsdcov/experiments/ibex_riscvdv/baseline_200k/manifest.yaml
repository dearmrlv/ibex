schema_version: bsd_cov_result_v0.1
experiment_id: ibex_200k_riscvdv_baseline
design:
  name: ibex
  repo_path: designs/ibex
  commit: 9eec3b0f001e99e762d82cf9dcee39de29369c57
  ibex_config: opentitan
sim:
  simulator: xlm
  iss: spike
  cov: true
  waves: false
testgen:
  generator: riscv-dv
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test
  start_seed: 888
  num_seeds: 1
  requested_instr_cnt_per_seed: 200000
budget:
  primary_axis: generated_instr_count
  generated_instr_budget: 200000
  per_seed_generated_instr: 200000
sampling:
  mode: dense
  trigger_type: generated
  step: 1000
  limit: 200000
instruction_count_definitions:
  generated_instr_count: Static instructions generated by riscv-dv, counted from test.S.
  dut_seen_instr_count: Instructions accepted or attempted by the DUT frontend / ID
    stage. Missing in v0.1 unless explicit counter exists.
  retired_instr_count: Instructions counted from rtl_trace.csv, assumed to be retired
    instructions.
method:
  id: baseline_riscvdv_200k_dense_seed888
  name: baseline_riscvdv_200k_dense_seed888
  type: baseline
  description: riscv-dv random baseline with one seed, 200k generated instructions,
    sampled every 1k instructions.

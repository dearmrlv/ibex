target_id: ibex_hazard_stall
model_id: bsd_hazard_stall_iter000
verilog:
  top_module: function_top
  input_port: i
  output_port: o
  input_width: 40
  output_width: 4
  files:
  - function_top.v
  - function_layer_0_nodes_1111.v
dataset:
  mode: mask_aware_dataset_replay
  train_samples: 2389
  eval_samples: 2389
  replay_samples_per_node: 16
bit_order:
  packed_bits: listed_order_msb_to_lsb
  bsd_bits: verilog_lsb_indexed
  conversion: bsd_bit[k] = packed_bits[width - 1 - k]
bsd:
  variable_order: identity
  thirdparty_bsd_modified: false
known_limitations:
- model is trained only from observed simulation samples
- unobserved branches use deterministic majority fallback
- mem_raw_hz is currently constant zero
- id_instr_category_basic is opcode-based and approximate
- train and eval splits are identical in first implementation
